events {}

http {
    server {
        listen 80;
        server_name api.loyalcloudcrm.com;
        # ส่งคนที่เข้า http ไปหา https ทั้งหมด
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.loyalcloudcrm.com;

        # ชี้ทางไปหากุญแจที่เราเพิ่งได้มา
        ssl_certificate /etc/letsencrypt/live/api.loyalcloudcrm.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.loyalcloudcrm.com/privkey.pem;

        location / {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}