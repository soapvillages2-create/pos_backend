# Loyalcloud CRM — Phase 1: Backend + PostgreSQL + Nginx (Reverse Proxy)
# ค่าทั้งหมดที่เป็นความลับ: ใส่ในไฟล์ .env บนเซิร์ฟเวอร์เท่านั้น — ห้าม commit .env
#
# รัน: docker compose up -d --build
# ค่า DB_* ใช้ร่วมกันระหว่าง service db กับ backend

services:
  db:
    image: postgres:16-alpine
    container_name: loyalcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # ใช้ค่าเดียวกับ .env บนเครื่อง (docker compose แทรกค่าตอน parse)
      test: ["CMD-SHELL", "pg_isready -U \"${DB_USER}\" -d \"${DB_NAME}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - loyalcloud

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loyalcloud-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # override จาก .env บนเครื่อง dev ที่อาจเป็น localhost — ใน Docker ต้องชี้ service db
      DB_HOST: db
      DB_PORT: "5432"
      # คงที่ 3001 ให้ตรงกับ nginx/nginx.conf (upstream) และ Dockerfile HEALTHCHECK
      PORT: "3001"
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3001"
    networks:
      - loyalcloud

  nginx:
    image: nginx:alpine
    container_name: loyalcloud-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-etc:/etc/letsencrypt:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - loyalcloud

  # ใช้ครั้งเดียว/ตามรอบ renew — ไม่รันอัตโนมัติตอน `docker compose up`
  # คำสั่ง: docker compose --profile cert run --rm certbot certonly ...
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    profiles:
      - cert

volumes:
  postgres_data:
  certbot-www:
  certbot-etc:

networks:
  loyalcloud:
    driver: bridge
